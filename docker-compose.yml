services:
  backend:
    build:
      context: ./backend
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    expose:
      - "9000"
    volumes:
      - ./backend:/var/www
      - ./backend/.env:/var/www/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./backend:/var/www:ro
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  queue:
    build:
      context: ./backend
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    command: php artisan queue:listen --tries=3 --timeout=60
    volumes:
      - ./backend:/var/www
      - ./backend/.env:/var/www/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tpmapp
      POSTGRES_USER: tpmapp
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpmapp"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
